<h1 class="title">Gestión de Eventos</h1>
<p class="events-description">Administra todos tus eventos</p>

<!-- Filtros -->
<div class="filters">
  <button class="filter-btn active">Próximos</button>
  <button class="filter-btn">Completados</button>
  <button class="filter-btn">Todos</button>
</div>

<!-- Lista de eventos -->
<div class="events-list">

  <div class="event-card">
    <!-- Cabecera -->
    <div class="event-card-header">
      <div class="event-card-title-row">
        <h3 class="event-card-name">Taller de Fotografía Urbana</h3>
        <span class="badge badge-proximo">Próximo</span>
      </div>
      <div class="event-card-actions">
        <button class="icon-btn">&#x2197;</button>
        <button class="icon-btn">&#9881;</button>
      </div>
    </div>

    <!-- Fecha y hora -->
    <div class="event-card-meta">
      <span>📅 19 de enero</span>
      <span>🕐 18:00</span>
    </div>

    <!-- Stats -->
    <div class="event-stats-grid">
      <div class="stat-card stat-blue">
        <span class="stat-label">👤 Asistentes</span>
        <span class="stat-value blue">24/30</span>
      </div>
      <div class="stat-card stat-green">
        <span class="stat-label">👁 Vistas</span>
        <span class="stat-value green">156</span>
      </div>
      <div class="stat-card stat-purple">
        <span class="stat-label">↗ Ocupación</span>
        <span class="stat-value purple">80%</span>
      </div>
      <div class="stat-card stat-orange">
        <span class="stat-label">💳 Ingresos</span>
        <span class="stat-value orange">€720</span>
      </div>
    </div>

    <!-- Progreso -->
    <div class="event-progress-section">
      <div class="event-progress-label">
        <span>Progreso de inscripciones</span>
        <span>80%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 80%"></div>
      </div>
    </div>
  </div>

</div>
