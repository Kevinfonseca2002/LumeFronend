<!-- TODO: Logica FOR para duplicar los cuadros -->


<div class="filter">
    <button>All Events</button>
    <button>Upcoming Events</button>
    <button>Past</button>
</div>

<div class="card-position">
@for(event of events ; track events){
<div class="card">
    <div class="event-img">
        <img src="assets/images/event-card/camino_mamifero.jpg" alt="">
    </div>
    <h3 class="name">{{event.eventName}}</h3>
    <p>{{event.eventDescription}}</p>
    
    <ul>
        <li>{{event.date}}</li>
        <li>{{event.date}}</li>
        <li>{{event.location}}</li>
        <li>{{event.attendees}}</li>
    </ul>
    <button (click)="prueba()">Asistir</button>
</div>
}
</div>
